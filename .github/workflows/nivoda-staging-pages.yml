name: Deploy Nivoda staging handoff

on:
  push:
    branches:
      - main
    paths:
      - docs/nivoda-staging/**
      - .github/workflows/nivoda-staging-pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: nivoda-staging-pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload staging page
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/nivoda-staging

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
